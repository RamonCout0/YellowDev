<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yellow Devil — Teletransporte via Fila de Mensagens</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0a0a12;
      color: #f8d800;
      font-family: "Courier New", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    h1 { font-size: 20px; letter-spacing: 1px; margin: 8px 0 2px; text-shadow: 2px 2px #000; }
    #janela { font-size: 13px; color: #a88000; margin-bottom: 12px; }
    #stage {
      position: relative;
      background: #101018;
      border: 3px solid #333;
      image-rendering: pixelated;
    }
    canvas { display: block; image-rendering: pixelated; }
    .controls { margin: 14px 0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
    button {
      font-family: inherit;
      font-weight: bold;
      font-size: 15px;
      color: #101018;
      background: #f8d800;
      border: 3px solid #fff;
      border-radius: 4px;
      padding: 10px 18px;
      cursor: pointer;
      text-shadow: none;
      box-shadow: 3px 3px #000;
      transition: filter .1s, transform .05s;
    }
    button:hover { filter: brightness(1.12); }
    button:active { transform: translate(2px, 2px); box-shadow: 1px 1px #000; }
    button:disabled { opacity: .4; cursor: not-allowed; filter: grayscale(.6); box-shadow: 3px 3px #000; }
    /* ATIRAR fica destacado e à esquerda; DEVOLVER (vermelho) fica separado à direita
       para não ser clicado sem querer. */
    #atirar { background: #38c8f8; border-color: #d8f8ff; font-size: 17px; padding: 12px 26px; }
    #devolver { background: #d82800; color: #fff; border-color: #ffb0a0; }
    .divisor { width: 2px; align-self: stretch; background: #2a2a3a; margin: 0 4px; }
    .hidden { display: none !important; }
    .hint { font-size: 12px; color: #8a8a9a; }
    .hint b { color: #38c8f8; }
    #log {
      width: 700px;
      max-width: 100%;
      height: 200px;
      overflow-y: auto;
      background: #05050a;
      border: 2px solid #222;
      color: #b8f8b8;
      font-size: 12px;
      line-height: 1.5;
      padding: 8px 10px;
      margin: 4px 0 24px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    /* Mudo: fixo no canto e SEMPRE visível — os outros botões são contextuais
       e somem, mas cortar o som tem que estar sempre a um clique. */
    #mudo {
      position: fixed;
      top: 10px;
      right: 12px;
      z-index: 10;
      font-size: 17px;
      padding: 5px 9px;
      background: #1a1a28;
      color: #f8d800;
      border: 2px solid #3a3a4a;
      box-shadow: 2px 2px #000;
    }
    #mudo:hover { filter: brightness(1.6); }
    #status { font-size: 12px; margin-bottom: 6px; }
    #status.on { color: #58f858; }
    #status.off { color: #d82800; }
  </style>
</head>
<body>
  <button id="mudo" title="Música ligada — clique para desligar (tecla M)">🔊</button>

  <h1>⚡ YELLOW DEVIL — TELETRANSPORTE DISTRIBUÍDO ⚡</h1>
  <div id="janela">janela-????</div>

  <div id="stage">
    <!-- 624px = 52 colunas do sprite * 12px de escala; +76px para a barra de vida vertical -->
    <canvas id="canvas" width="700" height="432"></canvas>
  </div>

  <div class="controls">
    <!-- Botões contextuais: sem boss => INVOCAR; com boss => ATIRAR + DEVOLVER -->
    <button id="invocar">▶ INVOCAR O BOSS</button>
    <button id="atirar" class="hidden">🔫 ATIRAR</button>
    <div id="divisor" class="divisor hidden"></div>
    <button id="devolver" class="hidden">↩ DEVOLVER AO SERVIDOR</button>
    <span class="hint">Atirar também pela tecla <b>ESPAÇO</b>. Ao zerar o HP, o boss recupera a vida e volta pro servidor.</span>
  </div>

  <div id="status" class="off">● desconectado</div>

  <pre id="log"></pre>

  <!-- Música do boss (loop). Só ambientação — o front funciona sem ela. -->
  <audio id="bossTheme" src="assets/boss-theme.mp3" loop></audio>

  <script src="stomp.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
