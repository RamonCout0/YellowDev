services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: yellowdevil-rabbitmq
    hostname: yellowdevil-rabbitmq
    ports:
      - "5672:5672"     # AMQP  — usado pelo back-end C# (MomOrchestrator / MomConsumer)
      - "15672:15672"   # Management UI (http://localhost:15672 — guest/guest)
      - "15674:15674"   # Web-STOMP (WebSocket) — usado pelo front-end JavaScript no navegador
    volumes:
      - ./enabled_plugins:/etc/rabbitmq/enabled_plugins
