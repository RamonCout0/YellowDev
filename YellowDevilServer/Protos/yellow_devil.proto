syntax = "proto3";

package megaman.boss;

// O Terminal 1 envia o monstro em pedaços
message DevilPart {
    int32 part_id = 1;       // A ordem do pedaço (para saber qual parte vai se juntar primeiro)
    bytes pixel_data = 2;    // Os dados da imagem/sprite daquele pedaço específico
    int32 target_x = 3;      // A posição onde esse pedaço vai se encaixar no Terminal 2
    int32 target_y = 4;
}

// O Terminal 2 responde quando o monstro terminar de se moldar
message ReassemblyStatus {
    bool is_complete = 1;    // Retorna true quando o Yellow Devil estiver 100% montado
    string message = 2;      // Ex: "Yellow Devil totalmente reconstituído no Terminal 2!"
}

// O Terminal 1 pede o monstro de volta
message ReturnRequest {
    bool shuffle = 1;        // Se true, as partes voltam em ordem embaralhada
}

// O Serviço de Teletransporte do Chefe
service YellowDevilTransfer {
    // Ida: as partes fluem do cliente para o servidor (client streaming)
    rpc Teleport (stream DevilPart) returns (ReassemblyStatus);

    // Volta: o cliente pede e as partes fluem do servidor de volta (server streaming)
    rpc TeleportBack (ReturnRequest) returns (stream DevilPart);
}